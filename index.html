<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#261f2d"><link rel="manifest" href="manifest.json"><link rel="icon" href="icon.svg"><link rel="stylesheet" href="style.css"><title>正史編纂室</title></head><body>
<header><div><p class="eyebrow">LOCAL CHAT ARCHIVE</p><h1>正史編纂室</h1><p>ChatGPTの正史を、選んで、整えて、残す。</p></div><div class="header-actions"><button id="settingsBtn" class="secondary">表示設定</button><label class="import">ログを追加<input id="file" type="file" accept=".json,application/json" multiple hidden></label></div></header>
<main><aside><input id="search" type="search" placeholder="全文検索（該当発言へ移動）"><div class="filters"><select id="model"><option value="">すべてのモデル</option></select><select id="persona"><option value="">すべてのペルソナ</option><option>🕯️ かげちゃん</option><option>🌕 まんちゃん</option><option>🔦 ひかちゃん</option><option>未分類</option></select></div><div class="filters"><select id="folder"><option value="">すべてのフォルダ</option></select><select id="speaker"><option value="">すべての話者</option><option value="user">ユーザー</option><option value="assistant">AI</option></select></div><p id="summary" class="muted">ログを読み込んでください。</p><div id="sessions" class="sessions"></div></aside><section id="viewer" class="viewer"><div class="empty"><div class="moon">◐</div><h2>会話は外へ送信されません</h2><p><code>conversations.json</code> を複数選択できます。差分は端末内のアーカイブへ統合されます。</p></div></section></main>
<dialog id="settings"><form method="dialog"><div class="dialog-head"><h2>表示と保存の設定</h2><button value="cancel" class="icon-btn" aria-label="閉じる">×</button></div><label>ユーザーの話者名<input id="userName" value="あなた"></label><label>AIの既定話者名<input id="assistantName" value="ChatGPT"></label><label>表示置換（1行に「元の文字列 => 表示する文字列」）<textarea id="replacements" rows="5" placeholder="元の名前 => 表示名"></textarea></label><p class="muted">置換は画面と長期保存用の出力に適用され、取り込んだ原文は変えません。</p><div class="dialog-actions"><button id="clearArchive" type="button" class="danger">端末内データを消去</button><button id="saveSettings" value="default">保存</button></div></form></dialog>
<script src="app.js"></script></body></html>
